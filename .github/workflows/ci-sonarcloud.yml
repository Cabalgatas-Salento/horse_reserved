name: CI — Build, Test & SonarCloud

# Ejecutar en push y PR a ramas principales
on:
  push:
    branches: [ chatbot, master, DESPLIEGUE_AWS, sonar ]
  pull_request:
    branches: [ chatbot, master, DESPLIEGUE_AWS, sonar ]

jobs:
  build-and-analyze:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    services:
      # Base de datos PostgreSQL efímera para los tests de integración
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: cabalgatas_db
          POSTGRES_USER: cabalgatas_user
          POSTGRES_PASSWORD: cabalgatas_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Checkout completo — fetch-depth 0 requerido por SonarCloud
      #    para analizar blame, nuevas líneas vs. código legacy, etc.
      - name: Checkout código fuente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Configurar Java 21 con distribución Temurin (Eclipse Adoptium)
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Cache de dependencias Gradle para acelerar builds subsiguientes
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Cache de paquetes SonarCloud para acelerar análisis
      - name: Cache SonarCloud
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # 5. Dar permisos de ejecución al wrapper de Gradle
      - name: Permisos gradlew
        run: chmod +x gradlew

      # 6. Compilar, correr tests y generar reporte JaCoCo XML
      #    Las variables de entorno apuntan a la BD efímera del servicio
      - name: Build, Test y JaCoCo
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/cabalgatas_db
          SPRING_DATASOURCE_USERNAME: cabalgatas_user
          SPRING_DATASOURCE_PASSWORD: cabalgatas_pass
          SPRING_MAIL_USERNAME: test@example.com
          SPRING_MAIL_PASSWORD: dummy
          JWT_SECRET: ci-secret-key-only-for-testing-not-production
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
        run: ./gradlew clean test jacocoTestReport --no-daemon

      # 7. Publicar resultados de tests como artefacto para revisar en PR
      - name: Publicar resultados de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/reports/tests/test/

      # 8. Publicar reporte HTML de cobertura como artefacto
      - name: Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/

      # 9. Análisis SonarCloud
      #    SONAR_TOKEN: secret creado en GitHub → Settings → Secrets
      #    GITHUB_TOKEN: provisto automáticamente por Actions para decorar PRs
      - name: Análisis SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/cabalgatas_db
          SPRING_DATASOURCE_USERNAME: cabalgatas_user
          SPRING_DATASOURCE_PASSWORD: cabalgatas_pass
        run: ./gradlew sonar --no-daemon