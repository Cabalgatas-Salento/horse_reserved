global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/horse-reserved-quality-rules.yml

scrape_configs:
  - job_name: 'horse-reserved-app'
    metrics_path: /actuator/prometheus
    scheme: https
    static_configs:
      - targets: ['${APP_RUNNER_HOST}']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
