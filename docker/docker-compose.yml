

services:
  postgres:
    image: postgres:17
    container_name: cabalgatas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cabalgatas_db
      POSTGRES_USER: cabalgatas_user
      POSTGRES_PASSWORD: cabalgatas_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    container_name: cabalgatas-postgres-exporter
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATA_SOURCE_NAME: postgresql://cabalgatas_user:cabalgatas_pass@postgres:5432/cabalgatas_db?sslmode=disable
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres-exporter/queries.yml
    ports:
      - "9187:9187"
    volumes:
      - ../monitoring/postgres-exporter/queries.yml:/etc/postgres-exporter/queries.yml:ro

  prometheus:
    image: prom/prometheus:v2.53.4
    container_name: cabalgatas-prometheus
    restart: unless-stopped
    depends_on:
      - postgres-exporter
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.2.2
    container_name: cabalgatas-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  prometheus_data:
  grafana_data: