# H2 en memoria (modo PostgreSQL)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Deshabilitar Flyway y OAuth2 en tests
spring.flyway.enabled=false
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.oauth2.client.OAuth2ClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

# JWT fijo para tests
jwt.secret=testsecretkey1234567890testsecretkey1234567890abc123
jwt.expiration=3600000

# Mail
spring.mail.host=localhost
spring.mail.port=3025

# App
cors.allowed-origins=http://localhost:4200
app.frontend.url=http://localhost:4200
app.mail.from=test@test.com

# Recaptcha
recaptcha.secret-key=test-secret-key

# MercadoPago sandbox
mercadopago.access-token=TEST_TOKEN
mercadopago.success-url=http://localhost/exito
mercadopago.failure-url=http://localhost/fallo
mercadopago.pending-url=http://localhost/pendiente
mercadopago.webhook-url=http://localhost/webhook
