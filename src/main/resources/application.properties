# Importar variables de entorno desde env.properties
spring.config.import=optional:classpath:env.properties

# =============================================================================
# CONFIGURACIï¿½N DE LA BASE DE DATOS
# =============================================================================
spring.application.name=horse_reserved
spring.datasource.url=jdbc:postgresql://localhost:5432/cabalgatas_db
spring.datasource.username=cabalgatas_user
spring.datasource.password=cabalgatas_pass
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

# =============================================================================
# CONFIGURACIï¿½N JPA/HIBERNATE
# =============================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================================================
# CONFIGURACIï¿½N FLYWAY
# =============================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# =============================================================================
# CONFIGURACIï¿½N JWT
# =============================================================================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=120000

# =============================================================================
# CONFIGURACIï¿½N CORS
# =============================================================================
cors.allowed-origins=http://localhost:4200

# =============================================================================
# CONFIGURACIï¿½N GOOGLE OAUTH2 - USANDO VARIABLES DE ENTORNO
# =============================================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# =============================================================================
# CONFIGURACIï¿½N OAUTH2 - URLs DE REDIRECCIï¿½N AUTORIZADAS
# =============================================================================
app.oauth2.authorized-redirect-uris=http://localhost:4200/auth/oauth2-redirect

# =============================================================================
# CONFIGURACIĂ“N CORREO ELECTRĂ“NICO - GMAIL SMTP
# =============================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# =============================================================================
# CONFIGURACIĂ“N DE LA APLICACIĂ“N
# =============================================================================
app.frontend.url=http://localhost:4200
spring.jackson.time-zone=America/Bogota
app.mail.from=${GMAIL_USERNAME}

# =============================================================================
# CONFIGURACIĂ“N reCAPTCHA
# =============================================================================
recaptcha.secret-key=${RECAPTCHA_SECRET_KEY}


# =============================================================================
# Logging base (desarrollo)
# =============================================================================
logging.level.root=INFO
logging.level.horse_reserved=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Patrï¿½n de consola: timestamp | nivel | thread | logger | mensaje
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Patrï¿½n de archivo (si se activa)
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# OBSERVABILIDAD (ACTUATOR + PROMETHEUS)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# =============================================================================
# CONFIGURACIĂ“N MERCADOPAGO (SANDBOX)
# =============================================================================
mercadopago.access-token=${MP_ACCESS_TOKEN}
mercadopago.success-url=${app.frontend.url}/tabs/pago/exito
mercadopago.failure-url=${app.frontend.url}/tabs/pago/fallo
mercadopago.pending-url=${app.frontend.url}/tabs/pago/pendiente
mercadopago.webhook-url=${MP_WEBHOOK_URL:}

# =============================================
# Autenticación en dos pasos (2FA) ? Login
# =============================================
auth.2fa.enabled=true
auth.2fa.otp.length=6
auth.2fa.otp.ttl-seconds=300
auth.2fa.otp.max-attempts=5
auth.2fa.otp.max-resends=3
auth.2fa.otp.resend-cooldown-seconds=60