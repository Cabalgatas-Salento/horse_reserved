# =============================================================================
# CONFIGURACIÓN DE PRODUCCIÓN — AWS App Runner + Neon PostgreSQL
# Las variables de entorno configuradas en App Runner sobreescriben estos valores.
# =============================================================================

# Base de datos (Neon PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=120000

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# URI de redirección del frontend tras OAuth2
app.oauth2.authorized-redirect-uris=${APP_OAUTH2_REDIRECT_URIS}

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# URLs de la aplicación
app.frontend.url=${APP_FRONTEND_URL}
spring.jackson.time-zone=America/Bogota
app.mail.from=${GMAIL_USERNAME}

# reCAPTCHA
recaptcha.secret-key=${RECAPTCHA_SECRET_KEY}

# Puerto (App Runner espera 8080)
server.port=8080

# Logging
# Menos verbosidad: reducir ruido de frameworks, mantener negocio en INFO
logging.level.root=WARN
logging.level.horse_reserved=INFO
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.flywaydb=INFO

# Logging a consola → CloudWatch Logs vía App Runner (no hay fs persistente)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n